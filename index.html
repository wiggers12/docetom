<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doce Tom - Bolos e Doces</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family: Arial;
margin:0;
background:#fff5f7;
}

header{
background:#8B4513;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.banner{
width:100%;
height:200px;
background:url('https://images.unsplash.com/photo-1578985545062-69928b1d9587') center/cover;
}

.container{
padding:20px;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.produto img{
width:100%;
border-radius:10px;
}

.nome{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.preco{
color:#e91e63;
font-weight:bold;
}

button{
width:100%;
padding:12px;
background:#25D366;
border:none;
color:white;
font-size:16px;
border-radius:8px;
margin-top:10px;
}

footer{
background:#8B4513;
color:white;
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<header>
Doce Tom 🍰
</header>

<div class="banner"></div>

<div class="container">

<h2>Bolos</h2>

<div class="produto">
<img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c">
<div class="nome">Bolo de Chocolate</div>
<div class="preco">R$ 65</div>

<button onclick="pedir('Bolo de Chocolate')">
Pedir no WhatsApp
</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
<div class="nome">Bolo Red Velvet</div>
<div class="preco">R$ 75</div>

<button onclick="pedir('Bolo Red Velvet')">
Pedir no WhatsApp
</button>
</div>

<h2>Doces</h2>

<div class="produto">
<img src="https://images.unsplash.com/photo-1588196749597-9ff075ee6b5b">
<div class="nome">Brigadeiro Gourmet</div>
<div class="preco">R$ 3,50</div>

<button onclick="pedir('Brigadeiro Gourmet')">
Pedir no WhatsApp
</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1599785209707-28b0a6a1f8c6">
<div class="nome">Trufa de Chocolate</div>
<div class="preco">R$ 5,00</div>

<button onclick="pedir('Trufa de Chocolate')">
Pedir no WhatsApp
</button>
</div>

</div>

<footer>
Instagram: @docetombr
</footer>

<script>

function pedir(produto){

let numero = "5551995484483"

let mensagem = `Olá! Vim pelo APP da Doce Tom e gostaria de pedir: ${produto}`

let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`

window.open(url)

}

</script>

</body>
</html>
